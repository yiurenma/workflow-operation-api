spring:
  application:
    name: workflow-operation-api

  # PostgreSQL Database
  datasource:
    url: jdbc:p6spy:postgresql://ep-frosty-bush-a5f8yx09-pooler.us-east-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    username: neondb_owner
    password: npg_iW3juwZGAI8K

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  # Render injects PORT; default 8080 for local
  port: ${PORT:8080}

# SpringDoc OpenAPI (consumed by ReDoc and Swagger UI)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  paths-to-exclude:
    - /profile
    - /profile/**
    - /api/profile
    - /api/profile/**
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  endpoint:
    health:
      show-details: when-authorized

logging:
  pattern:
    # Keep level concise; app name and trace correlation are already printed by Boot 4 defaults.
    level: "%5p"
  level:
    # Logbook prints request/response only when this logger is TRACE.
    org.zalando.logbook: TRACE
    p6spy: INFO
    com.p6spy: INFO

logbook:
  format:
    style: json
  exclude:
    - /actuator/**
    - /health
    - /error
    - /v3/api-docs/**
    - /swagger-ui/**
    - /swagger-ui.html
    - /redoc.html
  obfuscate:
    headers:
      - Authorization
      - Cookie
      - Set-Cookie
    parameters:
      - password
      - token
