</button>

<span class="material-symbols-outlined text-lg" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
</div>
<!-- FAB Bottom Right -->
<div class="fixed bottom-10 right-10 flex flex-col gap-4 items-end">
<a href="/swagger-ui.html" class="bg-white border border-gray-200 text-gray-900 p-3 rounded-xl shadow-xl cursor-pointer hover:bg-gray-50 transition-colors inline-flex" title="Open API docs">
<span class="material-symbols-outlined text-xl" data-icon="bolt">bolt</span>
</a>
</div>

<!-- Modal -->
<div id="modal-root" class="fixed inset-0 z-[200] hidden items-center justify-center p-4 bg-black/40" aria-modal="true" role="dialog">
<div class="bg-white rounded-xl max-w-3xl w-full max-h-[90vh] flex flex-col shadow-xl border border-gray-200">
<div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
<h2 id="modal-title" class="text-sm font-bold text-gray-900">Dialog</h2>
<button type="button" id="modal-close" class="p-1 rounded-lg hover:bg-gray-100 text-gray-500" aria-label="Close">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div id="modal-body" class="p-6 overflow-y-auto flex-1 text-sm"></div>
<div id="modal-footer" class="px-6 py-4 border-t border-gray-100 flex justify-end gap-2"></div>
</div>
</div>

<script>
(function () {
  const PAGE_SIZE = 15;
  const EMPTY_WORKFLOW = { pluginList: [], uiMapList: [] };

  let currentPage = 0;
  let totalPages = 0;
  let totalElements = 0;
  let activeApplicationName = null;

  const $ = (id) => document.getElementById(id);
  const banner = $('api-banner');
  const tbody = $('app-table-body');

  function showBanner(message, isError) {
    banner.textContent = message;
    banner.classList.remove('hidden', 'border-red-200', 'bg-red-50', 'text-red-800', 'border-amber-200', 'bg-amber-50', 'text-amber-900');
    if (isError) {
      banner.classList.add('border-red-200', 'bg-red-50', 'text-red-800');
    } else {
      banner.classList.add('border-amber-200', 'bg-amber-50', 'text-amber-900');
    }
    banner.classList.remove('hidden');
    if (!isError) setTimeout(() => banner.classList.add('hidden'), 4000);
  }

  function hideBanner() {
    banner.classList.add('hidden');
  }

  function escHtml(s) {
    if (s == null) return '';
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  function parseDate(v) {
    if (v == null) return null;
    if (typeof v === 'number') return new Date(v);
    const d = new Date(v);
    return isNaN(d.getTime()) ? null : d;
  }

  function formatAgo(v) {
    const d = parseDate(v);
    if (!d) return '—';
    const sec = Math.floor((Date.now() - d.getTime()) / 1000);
    if (sec < 60) return 'just now';
    if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
    if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
    if (sec < 604800) return Math.floor(sec / 86400) + 'd ago';
    return d.toLocaleDateString();
  }

  function rowDescription(es) {
    const parts = [es.region, es.eimId].filter(Boolean);
    if (parts.length) return parts.join(' · ');
    const flags = [];
    flags.push(es.enabled ? 'Enabled' : 'Disabled');
    if (es.retry) flags.push('retry');
    if (es.tracking) flags.push('tracking');
    return flags.join(' · ');
  }

  async function readError(res) {
    try {
      const j = await res.json();
      const info = j.errorInfo && j.errorInfo[0];
      if (info && info.detail && info.detail.cause) return info.detail.cause;
      if (info && info.code) return info.code;
    } catch (e) { /* ignore */ }
    return res.statusText || 'Request failed';
  }

  async function apiJson(url, options) {
    const res = await fetch(url, {
      credentials: 'same-origin',
      headers: { 'Accept': 'application/json', ...(options && options.headers) },
      ...options,
    });
    if (!res.ok) throw new Error(await readError(res));
    if (res.status === 204) return null;
    const ct = res.headers.get('content-type') || '';
    if (ct.includes('application/json')) return res.json();
    return null;
  }

  function closeModal() {
    $('modal-root').classList.add('hidden');
    $('modal-root').classList.remove('flex');
    $('modal-body').innerHTML = '';
    $('modal-footer').innerHTML = '';
    activeApplicationName = null;
  }

  function openModal(title) {
    $('modal-title').textContent = title;
    $('modal-body').innerHTML = '';
    $('modal-footer').innerHTML = '';
    const root = $('modal-root');
    root.classList.remove('hidden');
    root.classList.add('flex');
  }

  function setModalFooter(nodes) {
    const f = $('modal-footer');
    f.innerHTML = '';
    nodes.forEach((n) => f.appendChild(n));
  }

  $('modal-close').addEventListener('click', closeModal);
  $('modal-root').addEventListener('click', (e) => {
    if (e.target === $('modal-root')) closeModal();
  });

  async function loadTable() {
    hideBanner();
    const sort = $('sort-select').value;
    const q = $('search-input').value.trim();
    const params = new URLSearchParams({ page: String(currentPage), size: String(PAGE_SIZE), sort });
    if (q) params.set('applicationName', q);

    tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-sm text-on-surface-variant">Loading…</td></tr>';

    try {
      const data = await apiJson('/api/workflow/entity-setting?' + params.toString());
      totalElements = data.totalElements ?? 0;
      totalPages = data.totalPages ?? 0;
      const content = data.content || [];
      const start = totalElements === 0 ? 0 : currentPage * PAGE_SIZE + 1;
      const end = currentPage * PAGE_SIZE + content.length;
      $('page-summary').textContent =
        totalElements === 0 ? 'No applications' : 'Showing ' + start + '–' + end + ' of ' + totalElements + ' applications';
      $('page-indicator').textContent =
        totalPages > 0 ? 'Page ' + (currentPage + 1) + ' of ' + totalPages : '';
      $('page-prev').disabled = currentPage <= 0;
      $('page-next').disabled = totalPages === 0 || currentPage >= totalPages - 1;

      if (!content.length) {
        tbody.innerHTML =
          '<tr><td colspan="4" class="px-6 py-12 text-center text-sm text-on-surface-variant">No applications match your filters.</td></tr>';
        return;
      }

      tbody.innerHTML = content
        .map((es) => {
          const name = es.applicationName || '';
          const safeName = escHtml(name);
          const dataApp = encodeURIComponent(name);
          return (
            '<tr class="hover:bg-gray-50/50 transition-colors group/row" data-app="' +
            dataApp +
            '">' +
            '<td class="px-6 py-5 text-sm font-bold text-gray-900">' +
            safeName +
            '</td>' +
            '<td class="px-6 py-5 text-xs text-on-surface-variant font-medium leading-relaxed max-w-md">' +
            escHtml(rowDescription(es)) +
            '</td>' +
            '<td class="px-6 py-5 text-[11px] text-on-surface-variant font-semibold">' +
            escHtml(formatAgo(es.lastModifiedDateTime)) +
            '</td>' +
            '<td class="px-6 py-5 text-right">' +
            '<div class="relative group inline-block">' +
            '<button type="button" class="row-menu-btn p-1 hover:bg-gray-100 rounded transition-colors text-gray-400" aria-label="Actions">' +
            '<span class="material-symbols-outlined text-xl">more_vert</span></button>' +
            '<ul class="dropdown-menu min-w-[180px] bg-white border border-gray-200 rounded-lg shadow-xl py-1 overflow-hidden list-none text-left">' +
            '<li><button type="button" class="row-action w-full text-left px-4 py-2 text-[11px] text-gray-700 font-semibold hover:bg-gray-50 flex items-center gap-2" data-action="update"><span class="material-symbols-outlined text-sm">edit</span> Update workflow JSON</button></li>' +
            '<li><button type="button" class="row-action w-full text-left px-4 py-2 text-[11px] text-gray-700 font-semibold hover:bg-gray-50 flex items-center gap-2" data-action="review"><span class="material-symbols-outlined text-sm">visibility</span> Review</button></li>' +
            '<li><button type="button" class="row-action w-full text-left px-4 py-2 text-[11px] text-gray-700 font-semibold hover:bg-gray-50 flex items-center gap-2" data-action="copy"><span class="material-symbols-outlined text-sm">content_copy</span> Copy to…</button></li>' +
            '<li><button type="button" class="row-action w-full text-left px-4 py-2 text-[11px] text-gray-700 font-semibold hover:bg-gray-50 flex items-center gap-2 border-b border-gray-100" data-action="history"><span class="material-symbols-outlined text-sm">history</span> History</button></li>' +
            '<li><button type="button" class="row-action w-full text-left px-4 py-2 text-[11px] text-red-600 font-semibold hover:bg-red-50 flex items-center gap-2" data-action="delete"><span class="material-symbols-outlined text-sm text-red-600">delete</span> Delete</button></li>' +
            '</ul></div></td></tr>'
          );
        })
        .join('');
    } catch (err) {
      tbody.innerHTML =
        '<tr><td colspan="4" class="px-6 py-12 text-center text-sm text-red-600">Failed to load: ' +
        escHtml(err.message) +
        '</td></tr>';
      showBanner(err.message, true);
    }
  }

  async function fetchWorkflow(applicationName) {
    return apiJson('/api/workflow?applicationName=' + encodeURIComponent(applicationName));
  }

  tbody.addEventListener('click', async (e) => {
    const actionBtn = e.target.closest('.row-action');
    const row = e.target.closest('tr[data-app]');
    if (!actionBtn || !row) return;
    const applicationName = decodeURIComponent(row.getAttribute('data-app') || '');
    const action = actionBtn.getAttribute('data-action');

    if (action === 'delete') {
      if (!confirm('Delete workflow and related data for "' + applicationName + '"?')) return;
      try {
        const res = await fetch('/api/workflow?applicationName=' + encodeURIComponent(applicationName), {
          method: 'DELETE',
          credentials: 'same-origin',
          headers: { Accept: 'application/json' },
        });
        if (!res.ok) throw new Error(await readError(res));
        showBanner('Deleted "' + applicationName + '"', false);
        loadTable();
      } catch (err) {
        showBanner(err.message, true);
      }
      return;
    }

    if (action === 'review') {
      openModal('Review: ' + applicationName);
      $('modal-body').innerHTML = '<p class="text-xs text-on-surface-variant mb-2">Read-only workflow definition from GET /api/workflow</p><pre id="review-pre" class="text-xs bg-control-bg border border-control-border rounded-lg p-4 overflow-x-auto max-h-[55vh]">Loading…</pre>';
      setModalFooter([]);
      try {
        const wf = await fetchWorkflow(applicationName);
        $('review-pre').textContent = JSON.stringify(wf, null, 2);
      } catch (err) {
        $('review-pre').textContent = err.message;
      }
      return;
    }

    if (action === 'update') {
      activeApplicationName = applicationName;
      openModal('Update workflow: ' + applicationName);
      $('modal-body').innerHTML =
        '<p class="text-xs text-on-surface-variant mb-2">Edit JSON body for POST /api/workflow?applicationName=…</p>' +
        '<textarea id="workflow-json" class="w-full min-h-[280px] font-mono text-xs border border-gray-200 rounded-lg p-3 focus:ring-1 focus:ring-primary focus:border-primary outline-none" spellcheck="false"></textarea>';
      const ta = $('workflow-json');
      ta.value = 'Loading…';
      ta.disabled = true;
      const saveBtn = document.createElement('button');
      saveBtn.type = 'button';
      saveBtn.className = 'px-4 py-2 bg-primary text-white rounded-lg text-xs font-semibold hover:opacity-90';
      saveBtn.textContent = 'Save';
      const cancelBtn = document.createElement('button');
      cancelBtn.type = 'button';
      cancelBtn.className = 'px-4 py-2 bg-white border border-gray-200 rounded-lg text-xs font-semibold text-gray-700 hover:bg-gray-50';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.addEventListener('click', closeModal);
      setModalFooter([cancelBtn, saveBtn]);

      try {
        const wf = await fetchWorkflow(applicationName);
        ta.value = JSON.stringify(wf, null, 2);
        ta.disabled = false;
      } catch (err) {
        ta.value = '/* Error: ' + err.message + ' */';
        ta.disabled = false;
      }

      saveBtn.addEventListener('click', async () => {
        let body;
        try {
          body = JSON.parse($('workflow-json').value);
        } catch (err) {
          showBanner('Invalid JSON: ' + err.message, true);
          return;
        }
        saveBtn.disabled = true;
        try {
          await apiJson(
            '/api/workflow?applicationName=' + encodeURIComponent(activeApplicationName),
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            }
          );
          showBanner('Saved workflow for "' + activeApplicationName + '"', false);
          closeModal();
          loadTable();
        } catch (err) {
          showBanner(err.message, true);
        } finally {
          saveBtn.disabled = false;
        }
      });
      return;
    }

    if (action === 'copy') {
      activeApplicationName = applicationName;
      openModal('Copy workflow from: ' + applicationName);
      $('modal-body').innerHTML =
        '<label class="block text-xs font-semibold text-gray-600 mb-1">Target application name</label>' +
        '<input id="copy-target" type="text" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="NEW_APP_NAME" autocomplete="off" />' +
        '<p class="text-xs text-on-surface-variant mt-2">POST /api/workflow/autoCopy</p>';
      const goBtn = document.createElement('button');
      goBtn.type = 'button';
      goBtn.className = 'px-4 py-2 bg-primary text-white rounded-lg text-xs font-semibold hover:opacity-90';
      goBtn.textContent = 'Copy';
      const cancelBtn = document.createElement('button');
      cancelBtn.type = 'button';
      cancelBtn.className = 'px-4 py-2 bg-white border border-gray-200 rounded-lg text-xs font-semibold text-gray-700 hover:bg-gray-50';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.addEventListener('click', closeModal);
      setModalFooter([cancelBtn, goBtn]);
      goBtn.addEventListener('click', async () => {
        const to = $('copy-target').value.trim();
        if (!to) {
          showBanner('Enter a target application name', true);
          return;
        }
        goBtn.disabled = true;
        try {
          const params = new URLSearchParams({
            fromApplicationName: activeApplicationName,
            toApplicationName: to,
          });
          await apiJson('/api/workflow/autoCopy?' + params.toString(), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: '{}',
          });
          showBanner('Copied to "' + to + '"', false);
          closeModal();
          loadTable();
        } catch (err) {
          showBanner(err.message, true);
        } finally {
          goBtn.disabled = false;
        }
      });
      return;
    }

    if (action === 'history') {
      openModal('History: ' + applicationName);
      $('modal-body').innerHTML = '<pre id="hist-pre" class="text-xs bg-control-bg border border-control-border rounded-lg p-4 overflow-x-auto max-h-[55vh]">Loading…</pre>';
      setModalFooter([]);
      try {
        const hist = await apiJson(
          '/api/workflow/entity-setting/history?applicationName=' +
            encodeURIComponent(applicationName) +
            '&page=0&size=50'
        );
        $('hist-pre').textContent = JSON.stringify(hist, null, 2);
      } catch (err) {
        $('hist-pre').textContent = err.message;
      }
    }
  });

  $('btn-create-app').addEventListener('click', () => {
    openModal('Create application');
    $('modal-body').innerHTML =
      '<label class="block text-xs font-semibold text-gray-600 mb-1">Application name</label>' +
      '<input id="create-name" type="text" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm mb-4" placeholder="MY_APP" autocomplete="off" />' +
      '<p class="text-xs text-on-surface-variant">Creates an empty workflow (empty plugin list). You can edit JSON afterward.</p>';
    const createBtn = document.createElement('button');
    createBtn.type = 'button';
    createBtn.className = 'px-4 py-2 bg-primary text-white rounded-lg text-xs font-semibold hover:opacity-90';
    createBtn.textContent = 'Create';
    const cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.className = 'px-4 py-2 bg-white border border-gray-200 rounded-lg text-xs font-semibold text-gray-700 hover:bg-gray-50';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', closeModal);
    setModalFooter([cancelBtn, createBtn]);
    createBtn.addEventListener('click', async () => {
      const name = $('create-name').value.trim();
      if (!name) {
        showBanner('Enter an application name', true);
        return;
      }
      createBtn.disabled = true;
      try {
        await apiJson('/api/workflow?applicationName=' + encodeURIComponent(name), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(EMPTY_WORKFLOW),
        });
        showBanner('Created "' + name + '"', false);
        closeModal();
        currentPage = 0;
        $('search-input').value = '';
        $('sort-select').value = 'lastModifiedDateTime,desc';
        loadTable();
      } catch (err) {
        showBanner(err.message, true);
      } finally {
        createBtn.disabled = false;
      }
    });
  });

  $('sort-select').addEventListener('change', () => {
    currentPage = 0;
    loadTable();
  });

  let searchTimer;
  $('search-input').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      currentPage = 0;
      loadTable();
    }, 350);
  });

  $('page-prev').addEventListener('click', () => {
    if (currentPage > 0) {
      currentPage--;
      loadTable();
    }
  });
  $('page-next').addEventListener('click', () => {
    if (currentPage < totalPages - 1) {
      currentPage++;
      loadTable();
    }
  });

  loadTable();
})();
</script>
</main>
</body></html>
